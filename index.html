<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>portafolio</title>
</head>

<body>
  <svg xmlns="http://www.w3.org/2000/svg" style="display:none">

    <!-- YouTube -->
    <symbol id="icon-youtube" viewBox="0 0 100 100">
      <rect width="50" height="40" rx="8" fill="currentColor"></rect>
      <polygon points="20,12 20,28 34,20" fill="white"></polygon>
    </symbol>

    <!-- X -->
    <symbol id="icon-x" viewBox="0 0 40 40">
      <rect width="40" height="40" rx="8" fill="currentColor"></rect>
      <path d="M10 10 L30 30 M30 10 L10 30" stroke="white" stroke-width="3" stroke-linecap="round"></path>
    </symbol>

    <!-- LinkedIn -->
    <symbol id="icon-linkedin" viewBox="0 0 40 40">
      <rect width="40" height="40" rx="8" fill="currentColor"></rect>
      <circle cx="11" cy="12" r="3" fill="white"></circle>
      <rect x="8" y="16" width="6" height="16" fill="white"></rect>
      <path d="M20 32 V20 C20 16 28 16 28 20 V32" stroke="white" stroke-width="3" fill="none"></path>
    </symbol>

    <!-- GitHub -->
    <symbol id="icon-github" viewBox="0 0 40 40">
      <circle cx="20" cy="20" r="20" fill="currentColor"></circle>
      <path d="M20 10 C13 10 10 15 10 20 C10 25 13 30 20 30 C27 30 30 25 30 20 C30 15 27 10 20 10 Z" fill="white">
      </path>
      <circle cx="15" cy="18" r="2" fill="black"></circle>
      <circle cx="25" cy="18" r="2" fill="black"></circle>
    </symbol>

  </svg>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
